<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Music Score Editor</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f4f0;color:#1a1a1a;min-height:100vh;display:flex;align-items:flex-start;justify-content:center;padding:2rem 1rem}
#app{width:100%;max-width:980px}
h1{font-size:20px;font-weight:600;letter-spacing:-.3px;margin-bottom:1.1rem;color:#111}
h1 span{font-weight:400;color:#888;font-size:14px;margin-left:8px}
.panel{background:#fff;border:1px solid #e5e3dc;border-radius:12px;padding:11px 14px;margin-bottom:8px}
.row{display:flex;align-items:center;gap:9px;flex-wrap:wrap}
.lbl{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:#aaa;white-space:nowrap}
.div{width:1px;height:26px;background:#e5e3dc;flex-shrink:0}
.ibtn{padding:5px 12px;font-size:13px;font-weight:500;border:1px solid #d8d5cc;border-radius:8px;background:#fff;color:#333;cursor:pointer;transition:all .14s;white-space:nowrap}
.ibtn.on{background:#3C3489;color:#fff;border-color:#3C3489}
.ibtn:hover:not(.on){background:#f5f4f0}
.dbtn{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;padding:5px 8px;min-width:50px;height:52px;border:1px solid #e0ddd4;border-radius:8px;background:#fff;cursor:pointer;transition:all .12s}
.dbtn.on{background:#3C3489;border-color:#3C3489}
.dbtn:hover:not(.on){background:#f0efe9;border-color:#ccc}
.dbtn svg{display:block}
.dbtn span{font-size:10px;font-weight:500;color:#888;line-height:1}
.dbtn.on span{color:#c0bbff}
.npick{display:flex;gap:4px;flex-wrap:wrap}
.nbtn{width:34px;height:32px;font-size:11px;font-weight:500;border:1px solid #e0ddd4;border-radius:7px;background:#fff;color:#555;cursor:pointer;transition:all .12s}
.nbtn.on{background:#3C3489;color:#fff;border-color:#3C3489}
.nbtn:hover:not(.on){background:#f0efe9;color:#222;border-color:#ccc}
.rclust{display:flex;align-items:center;gap:8px;margin-left:auto;flex-wrap:wrap}
.trow{display:flex;align-items:center;gap:7px;font-size:13px;color:#666}
.trow input[type=range]{width:76px;accent-color:#3C3489}
.tv{font-weight:600;min-width:30px;color:#222}
.btn{padding:6px 13px;font-size:13px;font-weight:500;border:1px solid #d8d5cc;border-radius:8px;background:#fff;color:#333;cursor:pointer;transition:all .14s;white-space:nowrap}
.btn:hover{background:#f5f4f0;border-color:#bbb}
.btn.pri{background:#3C3489;color:#fff;border-color:#3C3489}
.btn.pri:hover{background:#534AB7}
.btn:active{transform:scale(.97)}
.btn:disabled{opacity:.4;cursor:default;transform:none}
.xrow{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:8px}
.xlbl{font-size:12px;color:#999;font-weight:500;text-transform:uppercase;letter-spacing:.5px}
.souter{border:1px solid #e5e3dc;border-radius:12px;background:#fff;box-shadow:0 1px 3px rgba(0,0,0,.04);padding:0 0 6px}
#sc{display:block;cursor:pointer;width:100%}
.bctr{font-size:12px;color:#aaa;padding:3px 14px 1px;text-align:right}
.bctr strong{color:#888}
.foot{display:flex;justify-content:space-between;align-items:center;margin-top:.65rem;flex-wrap:wrap;gap:4px}
.hint{font-size:12px;color:#aaa}
.stat{font-size:13px;color:#555;min-height:18px}
select.ibtn{padding:5px 8px}
</style>
</head>
<body>
<div id="app">
<h1>Music Score Editor <span>Score Composer</span></h1>

<!-- Row 1: instrument, clef, time sig, key sig, tempo, play -->
<div class="panel">
  <div class="row">
    <span class="lbl">Instr.</span>
    <div style="display:flex;gap:5px">
      <button class="ibtn on" id="bi-flute"    onclick="setInst('flute')">Flute</button>
      <button class="ibtn"    id="bi-clarinet" onclick="setInst('clarinet')">Clarinet</button>
    </div>
    <div class="div"></div>
    <span class="lbl">Clef</span>
    <div style="display:flex;gap:5px">
      <button class="ibtn on" id="bc-treble" onclick="setClef('treble')">𝄞 Treble</button>
      <button class="ibtn"    id="bc-bass"   onclick="setClef('bass')">𝄢 Bass</button>
    </div>
    <div class="div"></div>
    <span class="lbl">Time</span>
    <div style="display:flex;gap:5px">
      <button class="ibtn on" id="bt-4/4" onclick="setTimeSig('4/4')">4/4</button>
      <button class="ibtn"    id="bt-3/4" onclick="setTimeSig('3/4')">3/4</button>
      <button class="ibtn"    id="bt-2/4" onclick="setTimeSig('2/4')">2/4</button>
      <button class="ibtn"    id="bt-6/8" onclick="setTimeSig('6/8')">6/8</button>
    </div>
    <div class="div"></div>
    <span class="lbl">Key</span>
    <select class="ibtn" id="key-sel" onchange="setKey(this.value)">
      <option value="0">C maj / A min</option>
      <option value="1">G maj / E min (1♯)</option>
      <option value="2">D maj / B min (2♯)</option>
      <option value="3">A maj / F♯ min (3♯)</option>
      <option value="4">E maj / C♯ min (4♯)</option>
      <option value="-1">F maj / D min (1♭)</option>
      <option value="-2">B♭ maj / G min (2♭)</option>
      <option value="-3">E♭ maj / C min (3♭)</option>
      <option value="-4">A♭ maj / F min (4♭)</option>
    </select>
    <div class="rclust">
      <div class="trow">
        <span>Tempo</span>
        <input type="range" min="40" max="200" value="100" step="1" id="tslider" oninput="setTempo(this.value)">
        <span class="tv" id="tv">100</span>
        <span style="font-size:12px;color:#aaa">BPM</span>
      </div>
      <button class="btn" onclick="clearScore()">Clear</button>
      <button class="btn pri" id="pbtn" onclick="playScore()">&#9654; Play</button>
    </div>
  </div>
</div>

<!-- Row 2: note value -->
<div class="panel">
  <div class="row">
    <span class="lbl">Value</span>
    <div style="display:flex;gap:5px;flex-wrap:wrap" id="dpick"></div>
    <div class="div"></div>
    <span class="lbl">Pitch</span>
    <div class="npick" id="npick"></div>
    <div class="div"></div>
    <button class="ibtn" id="btn-rest"    onclick="toggleMode('rest')"    title="Rest">𝄽 Rest</button>
    <button class="ibtn" id="btn-breath"  onclick="toggleMode('breath')"  title="Breath mark">&#x1D110; Breath</button>
  </div>
</div>

<!-- Row 3: accidentals -->
<div class="panel">
  <div class="row">
    <span class="lbl">Accidental</span>
    <button class="ibtn" id="btn-sharp"   onclick="toggleAcc('sharp')"   title="Sharp">♯ Sharp</button>
    <button class="ibtn" id="btn-flat"    onclick="toggleAcc('flat')"    title="Flat">♭ Flat</button>
    <button class="ibtn" id="btn-natural" onclick="toggleAcc('natural')" title="Natural">♮ Natural</button>
    <span style="font-size:12px;color:#aaa;margin-left:4px">— applies to next placed note</span>
  </div>
</div>

<!-- Export row -->
<div class="xrow">
  <span class="xlbl">Export:</span>
  <button class="btn" onclick="exportPNG()">&#11015; PNG</button>
  <button class="btn" onclick="exportMusicXML()">&#11015; MusicXML</button>
  <div style="flex:1"></div>
  <button class="btn" onclick="addRow()">+ Add row</button>
</div>

<div class="souter">
  <canvas id="sc"></canvas>
  <div class="bctr" id="bctr">7 bars</div>
</div>
<div class="foot">
  <span class="hint">Select pitch + value → click slot. Add accidental before placing. Click placed note to remove.</span>
  <span class="stat" id="stat"></span>
</div>
</div>
<script>
// ═══════════════════════════════════════════════════════════════
// MUSIC DATA
// ═══════════════════════════════════════════════════════════════
const TREBLE_NOTES = ['C4','D4','E4','F4','G4','A4','B4','C5','D5','E5','F5','G5'];
const BASS_NOTES   = ['F2','G2','A2','B2','C3','D3','E3','F3','G3','A3','B3','C4'];

const NOTE_FREQS = {
  F2:87.31,G2:98,A2:110,B2:123.47,C3:130.81,D3:146.83,E3:164.81,
  F3:174.61,G3:196,A3:220,B3:246.94,C4:261.63,D4:293.66,E4:329.63,
  F4:349.23,G4:392,A4:440,B4:493.88,C5:523.25,D5:587.33,E5:659.25,F5:698.46,G5:783.99
};
const NOTE_STEP = {};
const NOTE_OCT  = {};
[...TREBLE_NOTES,...BASS_NOTES].forEach(n=>{
  NOTE_STEP[n]=n.replace(/[\d#b]/g,'');
  NOTE_OCT[n]=parseInt(n.match(/\d/));
});

const DURATIONS = [
  {id:'whole',    label:'Whole',  slots:16,xmlType:'whole',   xmlDiv:16},
  {id:'half',     label:'Half',   slots:8, xmlType:'half',    xmlDiv:8},
  {id:'quarter',  label:'Quarter',slots:4, xmlType:'quarter', xmlDiv:4},
  {id:'eighth',   label:'Eighth', slots:2, xmlType:'eighth',  xmlDiv:2},
  {id:'sixteenth',label:'16th',   slots:1, xmlType:'16th',    xmlDiv:1},
];

// Time signatures: beats per bar, beat unit, 16th-slots per bar
const TIME_SIGS = {
  '4/4':{beats:4,unit:4,slots:16},
  '3/4':{beats:3,unit:4,slots:12},
  '2/4':{beats:2,unit:4,slots:8},
  '6/8':{beats:6,unit:8,slots:12},
};

// Key signatures: positive=sharps, negative=flats
// Order of sharps: F C G D A E B  (degrees to sharpen)
// Order of flats:  B E A D G C F
const SHARP_ORDER = ['F','C','G','D','A','E','B'];
const FLAT_ORDER  = ['B','E','A','D','G','C','F'];

// Treble staff positions (line/space from bottom) for sharp/flat symbols
const SHARP_POS_TREBLE = [5,4,6,3,5,2,4]; // staff half-steps from bottom line
const FLAT_POS_TREBLE  = [4,6,3,5,2,4,1];
const SHARP_POS_BASS   = [3,2,4,1,3,0,2];
const FLAT_POS_BASS    = [2,4,1,3,0,2,-1];

// ═══════════════════════════════════════════════════════════════
// LAYOUT
// ═══════════════════════════════════════════════════════════════
const BARS_PER_ROW = 7;
const MIN_BARS     = 7;
const CLEF_W       = 80;   // space for clef + key sig + time sig
const ROW_PAD_TOP  = 52;
const ROW_PAD_BOT  = 34;
const ROW_GAP      = 22;
const LINE_GAP     = 15;
const N_LINES      = 5;
const STAFF_H      = (N_LINES-1)*LINE_GAP;
const ROW_H        = ROW_PAD_TOP + STAFF_H + ROW_PAD_BOT;

// ═══════════════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════════════
let instrument    = 'flute';
let clef          = 'treble';
let timeSig       = '4/4';
let keyFifths     = 0;       // -4..4
let tempo         = 100;
let selPitch      = null;
let selDur        = DURATIONS[2];
let inputMode     = 'note';  // 'note' | 'rest' | 'breath'
let pendingAcc    = null;    // 'sharp' | 'flat' | 'natural' | null
let isPlaying     = false;
let audioCtx      = null;
let placedNotes   = [];      // {slot,pitch,duration,isRest,isBreath,accidental}
let numBars       = MIN_BARS;

function noteNames()   { return clef==='treble' ? TREBLE_NOTES : BASS_NOTES; }
function slotsPerBar() { return TIME_SIGS[timeSig].slots; }
function totalSlots()  { return numBars * slotsPerBar(); }
function numRows()     { return Math.ceil(numBars / BARS_PER_ROW); }

// ═══════════════════════════════════════════════════════════════
// SETTERS
// ═══════════════════════════════════════════════════════════════
function setInst(i){
  instrument=i;
  ['flute','clarinet'].forEach(x=>document.getElementById('bi-'+x).classList.toggle('on',x===i));
}
function setClef(c){
  clef=c;
  ['treble','bass'].forEach(x=>document.getElementById('bc-'+x).classList.toggle('on',x===c));
  selPitch=null;
  document.querySelectorAll('.nbtn').forEach(b=>b.classList.remove('on'));
  rebuildNotePicker();
  draw();
}
function setTimeSig(ts){
  // Warn if notes exist that exceed new bar length
  timeSig=ts;
  ['4/4','3/4','2/4','6/8'].forEach(x=>document.getElementById('bt-'+x).classList.toggle('on',x===ts));
  placedNotes=placedNotes.filter(n=>{
    const bar=Math.floor(n.slot/slotsPerBar());
    const end=n.slot%slotsPerBar()+n.duration.slots;
    return end<=slotsPerBar();
  });
  draw(); setStat('Time signature: '+ts);
}
function setKey(v){
  keyFifths=parseInt(v); draw();
}
function setTempo(v){ tempo=parseInt(v); document.getElementById('tv').textContent=v; }

function toggleMode(m){
  inputMode = inputMode===m ? 'note' : m;
  ['rest','breath'].forEach(x=>document.getElementById('btn-'+x).classList.toggle('on',inputMode===x));
  if(inputMode!=='note'){
    selPitch=null;
    document.querySelectorAll('.nbtn').forEach(b=>b.classList.remove('on'));
  }
  setStat(inputMode==='rest'?'Rest mode — pick value then click slot':
          inputMode==='breath'?'Breath mark — click a slot after a note':'Note mode');
}
function toggleAcc(a){
  pendingAcc = pendingAcc===a ? null : a;
  ['sharp','flat','natural'].forEach(x=>document.getElementById('btn-'+x).classList.toggle('on',pendingAcc===x));
  setStat(pendingAcc ? 'Next note: '+pendingAcc : 'Accidental cleared');
}

function setStat(m){ document.getElementById('stat').textContent=m; }

// ═══════════════════════════════════════════════════════════════
// NOTE GLYPH SVGs
// ═══════════════════════════════════════════════════════════════
function noteGlyphSVG(id,color){
  const c=color||'#3C3489',sw=1.6;
  const sol=`<ellipse cx="12" cy="30" rx="7.5" ry="5" transform="rotate(-18,12,30)" fill="${c}"/>`;
  const opn=`<ellipse cx="12" cy="30" rx="7.5" ry="5" transform="rotate(-18,12,30)" fill="none" stroke="${c}" stroke-width="${sw}"/>`;
  const stm=`<line x1="19" y1="27" x2="19" y2="6" stroke="${c}" stroke-width="${sw}"/>`;
  const fl1=`<path d="M19,6 Q30,11 19,21" fill="none" stroke="${c}" stroke-width="${sw}"/>`;
  const fl2=`<path d="M19,6 Q30,11 19,21 M19,12 Q30,17 19,27" fill="none" stroke="${c}" stroke-width="${sw}"/>`;
  let b='';
  if(id==='whole')     b=`<ellipse cx="12" cy="30" rx="9" ry="6" transform="rotate(-18,12,30)" fill="none" stroke="${c}" stroke-width="${sw}"/>`;
  if(id==='half')      b=opn+stm;
  if(id==='quarter')   b=sol+stm;
  if(id==='eighth')    b=sol+stm+fl1;
  if(id==='sixteenth') b=sol+stm+fl2;
  return `<svg width="30" height="42" viewBox="0 0 32 44" xmlns="http://www.w3.org/2000/svg">${b}</svg>`;
}

// ═══════════════════════════════════════════════════════════════
// BUILD PICKERS
// ═══════════════════════════════════════════════════════════════
function buildDurPicker(){
  const el=document.getElementById('dpick');
  el.innerHTML='';
  DURATIONS.forEach(d=>{
    const btn=document.createElement('button');
    btn.className='dbtn'+(d.id===selDur.id?' on':'');
    btn.id='dur-'+d.id;
    btn.innerHTML=noteGlyphSVG(d.id,d.id===selDur.id?'#fff':'#3C3489')+`<span>${d.label}</span>`;
    btn.onclick=()=>selectDur(d);
    el.appendChild(btn);
  });
}
function selectDur(d){
  selDur=d;
  DURATIONS.forEach(x=>{
    const btn=document.getElementById('dur-'+x.id);
    const on=x.id===d.id;
    btn.classList.toggle('on',on);
    btn.innerHTML=noteGlyphSVG(x.id,on?'#fff':'#3C3489')+`<span>${x.label}</span>`;
  });
}

function rebuildNotePicker(){
  const el=document.getElementById('npick');
  el.innerHTML='';
  noteNames().forEach(n=>{
    const b=document.createElement('button');
    b.className='nbtn';
    b.innerHTML=n.replace(/\d/,'')+'<sub style="font-size:8px">'+n.replace(/\D/,'')+'</sub>';
    b.title=n; b.dataset.note=n;
    b.onclick=()=>selectPitch(n,b);
    el.appendChild(b);
  });
}
function selectPitch(note,btn){
  selPitch=note; inputMode='note';
  ['rest','breath'].forEach(x=>document.getElementById('btn-'+x).classList.remove('on'));
  document.querySelectorAll('.nbtn').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  setStat('Pitch: '+note+(pendingAcc?' + '+pendingAcc:''));
}

// ═══════════════════════════════════════════════════════════════
// CANVAS
// ═══════════════════════════════════════════════════════════════
const canvasEl=document.getElementById('sc');
const ctx=canvasEl.getContext('2d');

function canvasHeight(){ return numRows()*(ROW_H+ROW_GAP)-ROW_GAP+10; }
function resizeCanvas(){
  canvasEl.width =canvasEl.parentElement.clientWidth-2;
  canvasEl.height=canvasHeight();
  draw();
}

function rowTopY(row){ return row*(ROW_H+ROW_GAP)+ROW_PAD_TOP; }
function barPos(bi){ return {row:Math.floor(bi/BARS_PER_ROW),col:bi%BARS_PER_ROW}; }
function noteOffsetY(ni){ return (noteNames().length-1-ni)*(LINE_GAP/2); }

function noteAtSlot(slot){
  return placedNotes.find(n=>!n.isBreath&&slot>=n.slot&&slot<n.slot+n.duration.slots)||null;
}

// ═══════════════════════════════════════════════════════════════
// AUTO-GROW
// ═══════════════════════════════════════════════════════════════
function highestSlot(){
  if(!placedNotes.length) return -1;
  return Math.max(...placedNotes.map(n=>n.isBreath?n.slot:n.slot+n.duration.slots-1));
}
function lastBarFull(){
  const start=(numBars-1)*slotsPerBar(), end=start+slotsPerBar();
  let s=start,count=0;
  while(s<end){
    const n=noteAtSlot(s);
    if(n){const ne=Math.min(n.slot+n.duration.slots,end);count+=ne-s;s=ne;}
    else s++;
  }
  return count>=slotsPerBar();
}
function maybeGrow(){
  if(lastBarFull()){numBars++;updateBctr();resizeCanvas();}
}
function trimBars(){
  const h=highestSlot();
  const lastUsed=h<0?-1:Math.floor(h/slotsPerBar());
  const needed=Math.max(MIN_BARS,Math.ceil((lastUsed+2)/BARS_PER_ROW)*BARS_PER_ROW);
  if(needed<numBars){numBars=needed;updateBctr();resizeCanvas();}
}
function updateBctr(){
  const r=numRows();
  document.getElementById('bctr').innerHTML=
    '<strong>'+numBars+'</strong> bars &nbsp;·&nbsp; <strong>'+r+'</strong> row'+(r!==1?'s':'');
}
function addRow(){numBars+=BARS_PER_ROW;updateBctr();resizeCanvas();canvasEl.scrollIntoView({behavior:'smooth',block:'end'});}

// ═══════════════════════════════════════════════════════════════
// DRAW
// ═══════════════════════════════════════════════════════════════
function drawScore(tc,W,H,forExport){
  const lc='rgba(0,0,0,0.17)',dim='rgba(0,0,0,0.44)';
  const bw=(W-CLEF_W)/BARS_PER_ROW, sw=bw/slotsPerBar();
  tc.fillStyle='#fff'; tc.fillRect(0,0,W,H);

  const rows=numRows();
  for(let row=0;row<rows;row++){
    const top=rowTopY(row);
    const barsInRow=Math.min(BARS_PER_ROW,numBars-row*BARS_PER_ROW);

    // Alternating shading
    for(let col=0;col<barsInRow;col++){
      if((row*BARS_PER_ROW+col)%2===0){
        tc.fillStyle='rgba(0,0,0,0.018)';
        tc.fillRect(CLEF_W+col*bw,top,bw,STAFF_H);
      }
    }

    // Ghost last bar
    if(!forExport){
      const lb=numBars-1, lr=Math.floor(lb/BARS_PER_ROW), lc2=lb%BARS_PER_ROW;
      if(row===lr){
        const lbEmpty=!placedNotes.some(n=>!n.isBreath&&n.slot+n.duration.slots-1>=lb*slotsPerBar());
        if(lbEmpty){
          tc.fillStyle='rgba(83,74,183,0.035)';
          tc.fillRect(CLEF_W+lc2*bw,top,bw,STAFF_H);
          tc.font='400 10px sans-serif';tc.fillStyle='rgba(83,74,183,0.25)';tc.textAlign='center';
          tc.fillText('fill to add row',CLEF_W+(lc2+.5)*bw,top-15);
        }
      }
    }

    // Staff lines
    const staffEndX=CLEF_W+barsInRow*bw;
    for(let i=0;i<N_LINES;i++){
      const y=top+i*LINE_GAP;
      tc.beginPath();tc.strokeStyle=lc;tc.lineWidth=0.8;
      tc.moveTo(CLEF_W-6,y);tc.lineTo(staffEndX,y);tc.stroke();
    }

    // Bar lines
    for(let col=0;col<=barsInRow;col++){
      const x=CLEF_W+col*bw;
      tc.beginPath();tc.strokeStyle=lc;tc.lineWidth=(col===0||col===barsInRow)?1.4:0.7;
      tc.moveTo(x,top);tc.lineTo(x,top+STAFF_H);tc.stroke();
    }

    // Beat ticks
    const ts=TIME_SIGS[timeSig];
    for(let col=0;col<barsInRow;col++){
      for(let s=1;s<slotsPerBar();s++){
        const x=CLEF_W+(col*slotsPerBar()+s)*sw;
        const beatSlots=timeSig==='6/8'?2:4;
        const isB=s%beatSlots===0;
        tc.beginPath();
        tc.strokeStyle=isB?'rgba(0,0,0,0.09)':'rgba(0,0,0,0.035)';
        tc.lineWidth=0.5;
        const h2=isB?STAFF_H*.55:STAFF_H*.25;
        tc.moveTo(x,top+STAFF_H-h2);tc.lineTo(x,top+STAFF_H);tc.stroke();
      }
    }

    // Bar numbers + beat labels
    for(let col=0;col<barsInRow;col++){
      const bi=row*BARS_PER_ROW+col;
      tc.font='600 11px sans-serif';tc.fillStyle='rgba(0,0,0,0.2)';tc.textAlign='center';
      tc.fillText('Bar '+(bi+1),CLEF_W+(col+.5)*bw,top-32);
      for(let b=0;b<ts.beats;b++){
        const beatSlots=timeSig==='6/8'?2:4;
        const bx=CLEF_W+(col*slotsPerBar()+b*beatSlots+beatSlots/2)*sw;
        tc.font='400 9px sans-serif';tc.fillStyle='rgba(0,0,0,0.18)';
        tc.fillText(b+1,bx,top-17);
      }
    }

    // ── Clef symbol ──
    tc.font='bold 11px sans-serif';tc.fillStyle=dim;tc.textAlign='center';
    if(clef==='treble'){
      // Draw treble clef as styled text
      tc.font='42px serif';tc.fillStyle='rgba(0,0,0,0.55)';tc.textAlign='left';
      tc.fillText('𝄞',4,top+STAFF_H-2);
    } else {
      tc.font='30px serif';tc.fillStyle='rgba(0,0,0,0.55)';tc.textAlign='left';
      tc.fillText('𝄢',4,top+LINE_GAP+4);
    }

    // ── Key signature ──
    const keySharps=keyFifths>0?keyFifths:0;
    const keyFlats =keyFifths<0?-keyFifths:0;
    const accPos   =clef==='treble'?(keyFifths>0?SHARP_POS_TREBLE:FLAT_POS_TREBLE):(keyFifths>0?SHARP_POS_BASS:FLAT_POS_BASS);
    const accCount =keySharps||keyFlats;
    const accChar  =keyFifths>0?'♯':'♭';
    let kx=30;
    for(let i=0;i<accCount;i++){
      const halfStep=accPos[i];
      const ky=top+STAFF_H-halfStep*(LINE_GAP/2);
      tc.font='bold 14px serif';tc.fillStyle='rgba(0,0,0,0.6)';tc.textAlign='left';
      tc.fillText(accChar,kx,ky+5);
      kx+=9;
    }

    // ── Time signature ──
    const tsX=CLEF_W-18;
    tc.font='bold 16px serif';tc.fillStyle='rgba(0,0,0,0.55)';tc.textAlign='center';
    tc.fillText(ts.beats.toString(), tsX, top+LINE_GAP*1.5+2);
    tc.fillText(ts.unit.toString(),  tsX, top+LINE_GAP*3+4);
  }

  // ═══════════════════════════════════════════════════════════════
  // DRAW NOTES, RESTS, BREATHS
  // ═══════════════════════════════════════════════════════════════
  const bw2=(canvasEl.width-CLEF_W)/BARS_PER_ROW;
  const sw2=bw2/slotsPerBar();

  placedNotes.forEach(n=>{
    const bar=Math.floor(n.slot/slotsPerBar());
    const {row,col}=barPos(bar);
    const slotInRow=n.slot-row*BARS_PER_ROW*slotsPerBar();
    const top=rowTopY(row);
    const NC='#534AB7', RC='#777';

    // ── Breath mark ──
    if(n.isBreath){
      const bx=CLEF_W+slotInRow*sw2;
      tc.font='bold 16px serif';tc.fillStyle='rgba(83,74,183,0.6)';tc.textAlign='center';
      tc.fillText(',',bx,top-6);
      tc.font='400 9px sans-serif';tc.fillStyle='rgba(83,74,183,0.4)';
      tc.fillText('breath',bx,top+STAFF_H+20);
      return;
    }

    const dur=n.duration;
    const spanPx=dur.slots*sw2;
    const cx=CLEF_W+slotInRow*sw2+spanPx/2;

    // Duration + rest label below
    tc.font='400 9px sans-serif';tc.fillStyle='rgba(83,74,183,0.4)';tc.textAlign='center';
    tc.fillText(dur.label+(n.isRest?' rest':''),cx,top+STAFF_H+20);

    // ── Rest glyph ──
    if(n.isRest){
      const midY=top+STAFF_H/2;
      tc.fillStyle=RC;tc.strokeStyle=RC;
      if(dur.id==='whole'){tc.fillRect(cx-8,top+LINE_GAP,16,6);}
      else if(dur.id==='half'){tc.fillRect(cx-8,top+LINE_GAP*2-6,16,6);}
      else if(dur.id==='quarter'){
        tc.lineWidth=1.6;tc.lineJoin='round';tc.lineCap='round';
        tc.beginPath();tc.moveTo(cx+3,midY-10);tc.lineTo(cx-3,midY-4);tc.lineTo(cx+4,midY+1);
        tc.lineTo(cx-1,midY+5);tc.bezierCurveTo(cx-5,midY+9,cx-6,midY+13,cx,midY+10);tc.stroke();
      } else if(dur.id==='eighth'){
        tc.lineWidth=1.5;
        tc.beginPath();tc.moveTo(cx+1,midY-8);tc.lineTo(cx-2,midY+8);tc.stroke();
        tc.beginPath();tc.arc(cx+3,midY-5,3,0,Math.PI*2);tc.fill();
        tc.beginPath();tc.moveTo(cx+3,midY-5);tc.bezierCurveTo(cx+10,midY-3,cx+8,midY+4,cx+1,midY+2);tc.stroke();
      } else if(dur.id==='sixteenth'){
        tc.lineWidth=1.5;
        tc.beginPath();tc.moveTo(cx+1,midY-10);tc.lineTo(cx-2,midY+8);tc.stroke();
        tc.beginPath();tc.arc(cx+3,midY-7,2.5,0,Math.PI*2);tc.fill();
        tc.beginPath();tc.arc(cx+3,midY-1,2.5,0,Math.PI*2);tc.fill();
        tc.lineWidth=1.3;
        tc.beginPath();tc.moveTo(cx+3,midY-7);tc.bezierCurveTo(cx+9,midY-5,cx+7,midY+1,cx+1,midY-1);tc.stroke();
        tc.beginPath();tc.moveTo(cx+3,midY-1);tc.bezierCurveTo(cx+9,midY+1,cx+7,midY+7,cx+1,midY+5);tc.stroke();
      }
      return;
    }

    // ── Regular note ──
    const ni=noteNames().indexOf(n.pitch);
    const cy=top+noteOffsetY(ni);
    const isOpen=dur.id==='whole'||dur.id==='half';

    // Ledger lines
    if(cy<top-LINE_GAP/2){
      for(let ly=top-LINE_GAP;ly>=cy-2;ly-=LINE_GAP){
        tc.beginPath();tc.strokeStyle=NC;tc.lineWidth=0.8;
        tc.moveTo(cx-11,ly);tc.lineTo(cx+11,ly);tc.stroke();
      }
    }
    if(cy>top+STAFF_H+LINE_GAP/2){
      for(let ly=top+STAFF_H+LINE_GAP;ly<=cy+2;ly+=LINE_GAP){
        tc.beginPath();tc.strokeStyle=NC;tc.lineWidth=0.8;
        tc.moveTo(cx-11,ly);tc.lineTo(cx+11,ly);tc.stroke();
      }
    }

    // Note head
    const rx=Math.min(spanPx/2-2,9),ry=5.5;
    tc.beginPath();tc.ellipse(cx,cy,rx,ry,-0.22,0,Math.PI*2);
    if(isOpen){tc.strokeStyle=NC;tc.lineWidth=1.8;tc.stroke();}
    else{tc.fillStyle=NC;tc.fill();}

    // Stem
    if(dur.id!=='whole'){
      const sx=cx+rx-1,sty=cy-28;
      tc.beginPath();tc.strokeStyle=NC;tc.lineWidth=1.5;
      tc.moveTo(sx,cy);tc.lineTo(sx,sty);tc.stroke();
      if(dur.id==='eighth'||dur.id==='sixteenth'){
        tc.beginPath();tc.strokeStyle=NC;tc.lineWidth=1.5;
        tc.moveTo(sx,sty);tc.bezierCurveTo(sx+11,sty+5,sx+9,sty+13,sx,sty+17);tc.stroke();
      }
      if(dur.id==='sixteenth'){
        const f2=sty+10;
        tc.beginPath();tc.strokeStyle=NC;tc.lineWidth=1.5;
        tc.moveTo(sx,f2);tc.bezierCurveTo(sx+11,f2+5,sx+9,f2+13,sx,f2+17);tc.stroke();
      }
    }

    // Accidental
    if(n.accidental){
      const ac=n.accidental==='sharp'?'♯':n.accidental==='flat'?'♭':'♮';
      tc.font='bold 13px serif';tc.fillStyle=NC;tc.textAlign='right';tc.textBaseline='middle';
      tc.fillText(ac,cx-rx-2,cy);tc.textBaseline='alphabetic';
    }

    // Pitch label
    tc.font='500 8px sans-serif';tc.fillStyle=isOpen?NC:'#fff';
    tc.textAlign='center';tc.textBaseline='middle';
    tc.fillText(n.pitch.replace(/\d/,''),cx,cy+0.5);
    tc.textBaseline='alphabetic';
  });

  if(forExport){
    tc.font='11px sans-serif';tc.fillStyle='rgba(0,0,0,0.28)';tc.textAlign='left';
    tc.fillText('Tempo: '+tempo+' BPM  |  '+instrument[0].toUpperCase()+instrument.slice(1)+
      '  |  Clef: '+clef+'  |  '+timeSig+'  |  Key: '+keyLabel(),12,H-5);
  }
}

function keyLabel(){
  if(keyFifths===0) return 'C maj';
  const labels={'1':'G maj','2':'D maj','3':'A maj','4':'E maj','-1':'F maj','-2':'Bb maj','-3':'Eb maj','-4':'Ab maj'};
  return labels[keyFifths]||'';
}

function draw(){ drawScore(ctx,canvasEl.width,canvasEl.height,false); }

// ═══════════════════════════════════════════════════════════════
// CLICK HANDLER
// ═══════════════════════════════════════════════════════════════
canvasEl.addEventListener('click',e=>{
  if(isPlaying) return;
  const rect=canvasEl.getBoundingClientRect();
  const mx=(e.clientX-rect.left)*(canvasEl.width/rect.width);
  const my=(e.clientY-rect.top)*(canvasEl.height/rect.height);
  const W=canvasEl.width;
  const bw=(W-CLEF_W)/BARS_PER_ROW, sw=bw/slotsPerBar();

  let clickedRow=-1;
  for(let r=0;r<numRows();r++){
    const top=rowTopY(r);
    if(my>=top-ROW_PAD_TOP&&my<=top+STAFF_H+ROW_PAD_BOT){clickedRow=r;break;}
  }
  if(clickedRow<0) return;

  const barsInRow=Math.min(BARS_PER_ROW,numBars-clickedRow*BARS_PER_ROW);
  const colInRow=Math.floor((mx-CLEF_W)/bw);
  if(colInRow<0||colInRow>=barsInRow) return;

  const slotInRow=Math.floor((mx-CLEF_W)/sw);
  const globalSlot=clickedRow*BARS_PER_ROW*slotsPerBar()+slotInRow;
  if(globalSlot<0||globalSlot>=totalSlots()) return;

  // Remove existing note/rest at this slot
  const existing=noteAtSlot(globalSlot);
  // Also check for breath at this exact slot
  const existBreath=placedNotes.find(n=>n.isBreath&&n.slot===globalSlot);

  if(existing&&inputMode==='note'||existing&&inputMode==='rest'){
    placedNotes=placedNotes.filter(n=>n!==existing);
    setStat('Removed '+(existing.isRest?'rest':existing.pitch)+' ('+existing.duration.label+')');
    trimBars();draw();return;
  }
  if(existBreath&&inputMode==='breath'){
    placedNotes=placedNotes.filter(n=>n!==existBreath);
    setStat('Removed breath mark');draw();return;
  }

  // Breath mark
  if(inputMode==='breath'){
    placedNotes.push({slot:globalSlot,isBreath:true,pitch:null,duration:DURATIONS[2],isRest:false});
    placedNotes.sort((a,b)=>a.slot-b.slot);
    setStat('Placed breath mark');draw();return;
  }

  // Rest
  if(inputMode==='rest'){
    const endSlot=globalSlot+selDur.slots;
    const startBar=Math.floor(globalSlot/slotsPerBar());
    const endBar=Math.floor((endSlot-1)/slotsPerBar());
    if(startBar!==endBar){setStat('Rest would cross a bar line.');return;}
    if(endSlot>totalSlots()){setStat('Not enough space.');return;}
    for(let s=globalSlot;s<endSlot;s++){if(noteAtSlot(s)){setStat('Overlaps existing note.');return;}}
    placedNotes.push({slot:globalSlot,pitch:null,duration:selDur,isRest:true,isBreath:false,accidental:null});
    placedNotes.sort((a,b)=>a.slot-b.slot);
    setStat('Placed '+selDur.label+' rest');
    maybeGrow();draw();return;
  }

  // Note
  if(!selPitch){setStat('Select a pitch first!');return;}
  const endSlot=globalSlot+selDur.slots;
  const startBar=Math.floor(globalSlot/slotsPerBar());
  const endBar=Math.floor((endSlot-1)/slotsPerBar());
  if(startBar!==endBar){setStat('Note would cross a bar line.');return;}
  if(endSlot>totalSlots()){setStat('Not enough space.');return;}
  for(let s=globalSlot;s<endSlot;s++){if(noteAtSlot(s)){setStat('Overlaps existing note.');return;}}

  const acc=pendingAcc;
  placedNotes.push({slot:globalSlot,pitch:selPitch,duration:selDur,isRest:false,isBreath:false,accidental:acc});
  placedNotes.sort((a,b)=>a.slot-b.slot);
  // Clear pending accidental after use
  if(acc){pendingAcc=null;['sharp','flat','natural'].forEach(x=>document.getElementById('btn-'+x).classList.remove('on'));}
  setStat('Placed '+selPitch+(acc?' '+acc:'')+'  ('+selDur.label+')');
  maybeGrow();draw();
});

// CLEAR / EXPORT
// ═══════════════════════════════════════════════════════════════
function clearScore(){
  placedNotes=[];numBars=MIN_BARS;updateBctr();resizeCanvas();setStat('Score cleared');
}

// ═══════════════════════════════════════════════════════════════
// EXPORT PNG
// ═══════════════════════════════════════════════════════════════
function exportPNG(){
  if(!placedNotes.length){setStat('Add some notes first!');return;}
  const W=canvasEl.width,H=canvasEl.height;
  const exp=document.createElement('canvas');
  exp.width=W*2;exp.height=H*2;
  const ec=exp.getContext('2d');ec.scale(2,2);
  drawScore(ec,W,H,true);
  const a=document.createElement('a');a.download='sheet-music.png';
  a.href=exp.toDataURL('image/png');a.click();
  setStat('Downloaded sheet-music.png');
}

// ═══════════════════════════════════════════════════════════════
// EXPORT MusicXML
// ═══════════════════════════════════════════════════════════════
function exportMusicXML(){
  if(!placedNotes.length){setStat('Add some notes first!');return;}
  const DIV=4;
  const instName=instrument==='flute'?'Flute':'Clarinet';
  const midiProg=instrument==='flute'?73:71;
  const ts=TIME_SIGS[timeSig];
  const h=highestSlot();
  const exportBars=Math.max(1,Math.ceil((h+1)/slotsPerBar()));
  const noteMap={};
  placedNotes.filter(n=>!n.isBreath).forEach(n=>{noteMap[n.slot]=n;});

  const measures=[];
  for(let m=0;m<exportBars;m++){
    let c='';
    if(m===0){
      c+=`\n      <attributes>
        <divisions>${DIV}</divisions>
        <key><fifths>${keyFifths}</fifths></key>
        <time><beats>${ts.beats}</beats><beat-type>${ts.unit}</beat-type></time>
        <clef><sign>${clef==='treble'?'G':'F'}</sign><line>${clef==='treble'?2:4}</line></clef>
      </attributes>
      <direction placement="above"><direction-type><metronome parentheses="no"><beat-unit>quarter</beat-unit><per-minute>${tempo}</per-minute></metronome></direction-type><sound tempo="${tempo}"/></direction>`;
    }
    let s=m*slotsPerBar();
    while(s<(m+1)*slotsPerBar()){
      const n=noteMap[s];
      if(n&&!n.isRest){
        const alter=n.accidental==='sharp'?1:n.accidental==='flat'?-1:n.accidental==='natural'?0:undefined;
        const alterXml=alter!==undefined?`<alter>${alter}</alter>`:'';
        c+=`\n      <note><pitch><step>${NOTE_STEP[n.pitch]}</step>${alterXml}<octave>${NOTE_OCT[n.pitch]}</octave></pitch><duration>${n.duration.xmlDiv}</duration><type>${n.duration.xmlType}</type></note>`;
        s+=n.duration.slots;
      } else if(n&&n.isRest){
        c+=`\n      <note><rest/><duration>${n.duration.xmlDiv}</duration><type>${n.duration.xmlType}</type></note>`;
        s+=n.duration.slots;
      } else {
        c+=`\n      <note><rest/><duration>1</duration><type>16th</type></note>`;
        s++;
      }
    }
    measures.push(`  <measure number="${m+1}">${c}\n  </measure>`);
  }

  const xml=`<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE score-partwise PUBLIC "-//Recordare//DTD MusicXML 3.1 Partwise//EN" "http://www.musicxml.org/dtds/partwise.dtd">
<score-partwise version="3.1">
  <work><work-title>Sheet Music</work-title></work>
  <part-list>
    <score-part id="P1">
      <part-name>${instName}</part-name>
      <midi-instrument id="P1-I1"><midi-channel>1</midi-channel><midi-program>${midiProg}</midi-program><volume>80</volume></midi-instrument>
    </score-part>
  </part-list>
  <part id="P1">
${measures.join('\n')}
  </part>
</score-partwise>`;
  const blob=new Blob([xml],{type:'application/vnd.recordare.musicxml+xml'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.download='sheet-music.musicxml';a.href=url;a.click();
  URL.revokeObjectURL(url);
  setStat('Downloaded sheet-music.musicxml');
}

// ═══════════════════════════════════════════════════════════════
// SYNTHESIS
// ═══════════════════════════════════════════════════════════════
function synthNote(ac,freq,t0,dur,inst){
  const g=ac.createGain();g.connect(ac.destination);
  if(inst==='flute'){
    const o1=ac.createOscillator(),o2=ac.createOscillator(),o3=ac.createOscillator();
    o1.type='sine';o1.frequency.value=freq;
    o2.type='sine';o2.frequency.value=freq*2;
    o3.type='sine';o3.frequency.value=freq*3;
    const g1=ac.createGain();g1.gain.value=0.6;
    const g2=ac.createGain();g2.gain.value=0.25;
    const g3=ac.createGain();g3.gain.value=0.10;
    o1.connect(g1);o2.connect(g2);o3.connect(g3);
    g1.connect(g);g2.connect(g);g3.connect(g);
    const lfo=ac.createOscillator(),lg=ac.createGain();
    lfo.frequency.value=5.5;lg.gain.value=2.5;lfo.connect(lg);lg.connect(o1.frequency);
    g.gain.setValueAtTime(0,t0);g.gain.linearRampToValueAtTime(0.28,t0+Math.min(0.06,dur*.2));
    g.gain.setValueAtTime(0.22,t0+dur*.75);g.gain.linearRampToValueAtTime(0,t0+dur);
    [o1,o2,o3,lfo].forEach(o=>{o.start(t0);o.stop(t0+dur+.05);});
  } else {
    const o1=ac.createOscillator(),o3=ac.createOscillator(),o5=ac.createOscillator();
    o1.type='square';o1.frequency.value=freq;
    o3.type='sine';o3.frequency.value=freq*3;
    o5.type='sine';o5.frequency.value=freq*5;
    const g1=ac.createGain();g1.gain.value=0.45;
    const g3=ac.createGain();g3.gain.value=0.12;
    const g5=ac.createGain();g5.gain.value=0.05;
    const lp=ac.createBiquadFilter();lp.type='lowpass';lp.frequency.value=1800;lp.Q.value=2;
    o1.connect(g1);o3.connect(g3);o5.connect(g5);
    g1.connect(lp);g3.connect(lp);g5.connect(lp);lp.connect(g);
    g.gain.setValueAtTime(0,t0);g.gain.linearRampToValueAtTime(0.22,t0+Math.min(.03,dur*.15));
    g.gain.setValueAtTime(0.18,t0+dur*.7);g.gain.linearRampToValueAtTime(0,t0+dur);
    [o1,o3,o5].forEach(o=>{o.start(t0);o.stop(t0+dur+.05);});
  }
}

// ═══════════════════════════════════════════════════════════════
// PLAYBACK
// ═══════════════════════════════════════════════════════════════
async function playScore(){
  const notes=placedNotes.filter(n=>!n.isRest&&!n.isBreath);
  if(!notes.length){setStat('Add some notes first!');return;}
  if(isPlaying) return;
  isPlaying=true;
  const btn=document.getElementById('pbtn');
  btn.disabled=true;btn.textContent='Playing...';
  const ac=audioCtx||(audioCtx=new(window.AudioContext||window.webkitAudioContext)());
  if(ac.state==='suspended') await ac.resume();
  const sixteenth=(60/tempo)/4;
  const now=ac.currentTime+0.05;
  let lastEnd=0;
  notes.forEach(n=>{
    const t0=now+n.slot*sixteenth;
    const dur=n.duration.slots*sixteenth*.92;
    // Apply accidental to frequency
    let freq=NOTE_FREQS[n.pitch]||440;
    if(n.accidental==='sharp') freq*=Math.pow(2,1/12);
    else if(n.accidental==='flat') freq/=Math.pow(2,1/12);
    synthNote(ac,freq,t0,dur,instrument);
    lastEnd=Math.max(lastEnd,(n.slot+n.duration.slots)*sixteenth);
  });
  const iv=setInterval(()=>{
    const pct=Math.min(100,Math.round(((ac.currentTime-now)/lastEnd)*100));
    setStat('Playing... '+pct+'%');
  },80);
  setTimeout(()=>{
    clearInterval(iv);isPlaying=false;
    btn.disabled=false;btn.textContent='\u25b6 Play';
    setStat('Done');
  },(lastEnd+0.7)*1000);
}
